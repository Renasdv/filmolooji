```html
<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Filmoloji+</title>

<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0b0b0c;
color:white;
font-family:Montserrat;
}

header{
display:flex;

}

.logo{

}

background:#222;

}

}

.row{
display:flex;
gap:20px;

.row::-webkit-scrollbar{

min-width:180px;

</head>

<body>

<header>

<div class="logo">FILMOLOJI+</div>

<input id="search" placeholder="Film ara...">

</header>

<div id="home">

<section>

<h2>Devam Et</h2>

<div id="continue" class="row"></div>

</section>

<section>

<h2>Popüler</h2>

<div id="popular" class="row"></div>

</section>

<section>

<h2>En Çok Oy Alanlar</h2>

<div id="toprated" class="row"></div>

</section>

<section>

<h2>Yakında Çıkacaklar</h2>

<div id="upcoming" class="row"></div>

</section>

</div>

<div id="moviePage">

<h1 id="movieTitle"></h1>

<p id="movieDesc"></p>

<button id="watchBtn">Filmi İzle</button>

<iframe id="player"></iframe>

<h2>Önerilen Filmler</h2>

<div id="recommendations" class="row"></div>

</div>

<script>

const API="https://api.themoviedb.org/3"
const KEY="121b7340acdb3b8503f614416bac6d91"
const IMG="https://image.tmdb.org/t/p/w500"

loadRow("popular","/movie/popular")
loadRow("toprated","/movie/top_rated")
loadRow("upcoming","/movie/upcoming")

function showHome(){

document.getElementById("home").style.display="block"
document.getElementById("moviePage").style.display="none"

}

function showMovie(){

document.getElementById("home").style.display="none"
document.getElementById("moviePage").style.display="block"

}

async function loadRow(id,path){

const res=await fetch(`${API}${path}?api_key=${KEY}`)
const data=await res.json()

const row=document.getElementById(id)

data.results.forEach(movie=>{

if(!movie.poster_path)return

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="${IMG+movie.poster_path}">

<div class="card-title">${movie.title}</div>

<button class="fav">❤</button>

`

card.onclick=()=>openMovie(movie.id)

card.querySelector(".fav").onclick=(e)=>{

e.stopPropagation()

addFavorite(movie)

}

card.onmouseenter=()=>showTrailer(card,movie.id)
card.onmouseleave=()=>removeTrailer(card)

row.appendChild(card)

})

}

async function openMovie(id){

const res=await fetch(`${API}/movie/${id}?api_key=${KEY}`)
const data=await res.json()

showMovie()

document.getElementById("movieTitle").innerText=data.title
document.getElementById("movieDesc").innerText=data.overview

const imdb=data.imdb_id

document.getElementById("watchBtn").onclick=()=>{

document.getElementById("player").src=
`https://vidsrc.to/embed/movie/${imdb}`

saveContinue({
id:data.id,
title:data.title,
poster:data.poster_path
})

}

loadRecommendations(id)

}

async function loadRecommendations(id){

const res=await fetch(`${API}/movie/${id}/recommendations?api_key=${KEY}`)
const data=await res.json()

const row=document.getElementById("recommendations")

row.innerHTML=""

data.results.slice(0,10).forEach(movie=>{

if(!movie.poster_path)return

const card=document.createElement("div")

card.className="card"

card.innerHTML=`
<img src="${IMG+movie.poster_path}">
`

card.onclick=()=>openMovie(movie.id)

row.appendChild(card)

})

}

function addFavorite(movie){

let fav=JSON.parse(localStorage.getItem("favorites"))||[]

if(!fav.find(f=>f.id===movie.id)){

fav.push({
id:movie.id,
title:movie.title,
poster:movie.poster_path
})

localStorage.setItem("favorites",JSON.stringify(fav))

alert("Favorilere eklendi")

}

}

function saveContinue(movie){

let list=JSON.parse(localStorage.getItem("continue"))||[]

list=list.filter(m=>m.id!==movie.id)

list.unshift(movie)

localStorage.setItem("continue",JSON.stringify(list.slice(0,10)))

loadContinue()

}

function loadContinue(){

const list=JSON.parse(localStorage.getItem("continue"))||[]

const row=document.getElementById("continue")

row.innerHTML=""

list.forEach(movie=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="${IMG+movie.poster}">

<div class="card-title">${movie.title}</div>

`

card.onclick=()=>openMovie(movie.id)

row.appendChild(card)

})

}

loadContinue()

document.getElementById("search").addEventListener("keypress",async e=>{

if(e.key==="Enter"){

const q=e.target.value.trim()

if(!q)return

const res=await fetch(`${API}/search/movie?api_key=${KEY}&query=${q}`)

const data=await res.json()

const row=document.getElementById("popular")

row.innerHTML=""

data.results.forEach(movie=>{

if(!movie.poster_path)return

const card=document.createElement("div")

card.className="card"

card.innerHTML=`
<img src="${IMG+movie.poster_path}">
<div class="card-title">${movie.title}</div>
`

card.onclick=()=>openMovie(movie.id)

row.appendChild(card)

})

}

})

async function showTrailer(card,id){

const res=await fetch(`${API}/movie/${id}/videos?api_key=${KEY}`)

const data=await res.json()

const trailer=data.results.find(v=>v.type==="Trailer")

if(!trailer)return

const iframe=document.createElement("iframe")

iframe.className="preview"

iframe.src=`https://www.youtube.com/embed/${trailer.key}?autoplay=1&mute=1`

card.appendChild(iframe)

}

function removeTrailer(card){

const iframe=card.querySelector("iframe.preview")

if(iframe)iframe.remove()

}

</script>

</body>
</html>

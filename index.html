<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Filmoloji+ | Film ve Dizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#0b0b0c; --card:#17171a; --accent:#ff3d00; --text:#fff; }
        *{ margin:0; padding:0; box-sizing:border-box; font-family:Montserrat; }
        body{ background:var(--bg); color:white; overflow-x: hidden; }
        
        header {
            position:fixed; top:0; width:100%; background:rgba(17,17,17,0.95);
            padding:15px 6%; display:flex; justify-content:space-between;
            align-items:center; z-index:100; backdrop-filter: blur(10px);
        }
        .logo{ font-weight:800; font-size:24px; color:var(--accent); cursor:pointer; }
        .search{ background:#222; border:1px solid #333; padding:10px 15px; border-radius:10px; color:white; width: 250px; }
        
        .container{ padding:110px 6% 40px; }
        .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:20px; }
        
        .card{ background:var(--card); border-radius:12px; overflow:hidden; cursor:pointer; transition:.3s; position: relative; }
        .card:hover{ transform:translateY(-8px); border: 1px solid var(--accent); }
        .card img{ width:100%; height:270px; object-fit:cover; }
        .card .type-badge {
            position: absolute; top: 10px; right: 10px; background: var(--accent);
            padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: bold;
        }
        .info{ padding:12px; font-size: 14px; }
        .rating{ color:#ffc107; font-size: 12px; margin-top: 5px; }

        .modal{ position:fixed; top:0; left:0; width:100%; height:100%; background:black; display:none; align-items:center; justify-content:center; z-index:999; }
        .modal iframe{ width:100%; height:100%; border:none; }
        .close{ position:absolute; top:20px; right:30px; font-size:40px; cursor:pointer; z-index: 1001; color: white; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">FILMOLOJI+</div>
    <input id="search" class="search" placeholder="Film veya Dizi ara...">
</header>

<div class="container">
    <h2 id="title" style="margin-bottom: 25px;">Trend İçerikler</h2>
    <div id="movies" class="grid"></div>
    <div id="loader" style="text-align:center; padding:40px;">Yükleniyor...</div>
</div>

<div id="modal" class="modal">
    <div class="close" onclick="closePlayer()">×</div>
    <iframe id="player" allowfullscreen></iframe>
</div>

<script>
    const API="https://api.themoviedb.org/3";
    const KEY="121b7340acdb3b8503f614416bac6d91";
    const IMG="https://image.tmdb.org/t/p/w500";

    let page=1;
    let loading=false;
    let query="";

    const grid=document.getElementById("movies");

    async function loadContent() {
        if(loading) return;
        loading = true;
        
        let url = query 
            ? `${API}/search/multi?api_key=${KEY}&query=${query}&page=${page}&language=tr-TR`
            : `${API}/trending/all/week?api_key=${KEY}&page=${page}&language=tr-TR`;

        const res = await fetch(url);
        const data = await res.json();
        renderItems(data.results);
        
        page++;
        loading = false;
    }

    function renderItems(items) {
        items.forEach(item => {
            if(!item.poster_path || (item.media_type !== 'movie' && item.media_type !== 'tv')) return;

            const card = document.createElement("div");
            card.className = "card";
            const title = item.title || item.name;
            const type = item.media_type === 'tv' ? 'DIZI' : 'FILM';

            card.innerHTML = `
                <div class="type-badge">${type}</div>
                <img src="${IMG + item.poster_path}" alt="${title}">
                <div class="info">
                    <div style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${title}</div>
                    <div class="rating">★ ${item.vote_average.toFixed(1)}</div>
                </div>
            `;

            card.onclick = () => playContent(item.id, item.media_type);
            grid.appendChild(card);
        });
    }

    function playContent(id, type) {
        let embedUrl = "";
        if(type === 'tv') {
            // Dizi oynatıcısı - Sezon ve Bölüm vidsrc içinde seçilebilir
            embedUrl = `https://vidsrc.to/embed/tv/${id}?sub_pref=Turkish`;
        } else {
            // Film oynatıcısı
            embedUrl = `https://vidsrc.to/embed/movie/${id}?sub_pref=Turkish`;
        }
        
        document.getElementById("player").src = embedUrl;
        document.getElementById("modal").style.display = "flex";
        document.body.style.overflow = "hidden"; // Kaydırmayı engelle
    }

    function closePlayer() {
        document.getElementById("modal").style.display = "none";
        document.getElementById("player").src = "";
        document.body.style.overflow = "auto";
    }

    // Arama Fonksiyonu
    document.getElementById("search").addEventListener("keypress", e => {
        if(e.key === "Enter") {
            query = e.target.value;
            grid.innerHTML = "";
            page = 1;
            loadContent();
        }
    });

    // Sonsuz Kaydırma
    window.addEventListener("scroll", () => {
        if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 600) {
            loadContent();
        }
    });

    loadContent();
</script>

</body>
</html>
